server {
    listen 80 default_server;
    server_name factoryerp.uz www.factoryerp.uz _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://app:10000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 300;
        proxy_read_timeout 300;
        proxy_send_timeout 300;
    }
}

server {
    listen 443 ssl default_server;
    server_name factoryerp.uz www.factoryerp.uz _;

    # SSL Certificates (Managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/factoryerp.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/factoryerp.uz/privkey.pem;

    # Basic SSL Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Proxy to Node.js App container
    location / {
        proxy_pass http://app:10000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Extended timeouts for high-latency or slow requests
        proxy_connect_timeout 300;
        proxy_read_timeout 300;
        proxy_send_timeout 300;
    }
}
